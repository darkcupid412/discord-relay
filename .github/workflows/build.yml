name: Build

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: discord-relay
          path: build/libs/*.jar
