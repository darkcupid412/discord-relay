name: Release

on:
  push:
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew shadowJar --no-daemon
      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/*.jar
          body_path: CHANGELOG.md
